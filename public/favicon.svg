<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Red rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c0312b"/>
      <stop offset="100%" stop-color="#e05a55"/>
    </linearGradient>
  </defs>

  <!-- GIROS orbit icon (centered, scaled to ~44px within 64px canvas) -->
  <!-- Center circle -->
  <circle cx="32" cy="32" r="7.7" stroke="white" stroke-width="3" fill="none"/>

  <!-- Arc top-right (solid) -->
  <path d="M32 10 C43.5 10, 54 20.5, 54 32"
        stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Arc bottom-right (solid) -->
  <path d="M54 32 C54 43.5, 43.5 54, 32 54"
        stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Arc bottom-left (solid) -->
  <path d="M32 54 C20.5 54, 10 43.5, 10 32"
        stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Arc top-left (dashed / faded) -->
  <path d="M10 32 C10 20.5, 20.5 10, 32 10"
        stroke="rgba(255,255,255,0.38)" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="4 5" fill="none"/>

  <!-- Arrow at top -->
  <path d="M27.5 7.5 L32 10 L36.5 7.5"
        stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
